[tools]
rust = { version = "1.95.0", components = ["rustfmt", "clippy"] }
node = "24"
java = "openjdk-21"
android-sdk = "1.0"
uv = "0.11.14"
"cargo:cargo-watch" = "8.5.3"
"cargo:cargo-binstall" = "1.20.1"

[env]
MISE_DATA_DIR = "{{config_root}}/.mise"
MISE_STATE_DIR = "{{config_root}}/.mise/state"
MISE_CACHE_DIR = "{{config_root}}/.mise/cache"
_path = "./.cargo/bin"
MISE_COREPACK = "1"
ANDROID_HOME = "{{config_root}}/.android_sdk"
JAVA_HOME = "{{config_root}}/.mise/installs/java/openjdk-21"
_.python.venv = "{{config_root}}/apps/web/.venv"

[tasks."setup"]
description = "Install all dependencies"
run = [
  "corepack enable pnpm",
  "corepack use pnpm@11.1.2",
  "yes | sdkmanager --sdk_root={{env.ANDROID_HOME}} --licenses",
  "sdkmanager --sdk_root={{env.ANDROID_HOME}} \"platform-tools\" \"build-tools;34.0.0\" \"platforms;android-34\" \"cmdline-tools;latest\"",
  "cargo check",
  "pnpm install",
  "uv sync --project apps/web",
  "mise run setup:local-props",
]

[tasks."setup:local-props"]
description = "Generate local.properties safely across OS"
dir = "apps/android"
run = "echo 'sdk.dir={{env.ANDROID_HOME}}' > local.properties"

[tasks."misc:django-free-port"]
description = "Kill any process clinging onto port 8000"
run = """
if lsof -t -i:8000 > /dev/null; then
  echo "Found a zombie process on port 8000. Terminating..."
  kill -9 $(lsof -t -i:8000)
  echo "Port 8000 is now free!"
else
  echo "Port 8000 is already clear."
fi
"""

# Development
[tasks."dev:api"]
description = "Run Rust API Dev Server"
run = "cargo watch -c -x check -x 'run --bin ironbook_api'"

[tasks."dev:home"]
description = "Run NextJS Dev Server"
run = "pnpm --filter ./apps/home dev"

[tasks."dev:web"]
dir = "apps/web"
description = "Run Django Dev Server"
depends = ["misc:django-free-port"]
run = "python manage.py tailwind dev"

# Production
[tasks."prod:home"]
description = "Run NextJS Prod Server"
run = ["pnpm --filter ./apps/home build", "pnpm --filter ./apps/home start"]

# Environment
[tasks."web:activate"]
dir = "apps/web"
description = "Activate environmental Python Interpreter"
run = "uv run python --version"

[tasks."code"]
description = "Launch VS Code with injected monorepo environment"
run = "code ."

# Android Tasks
[tasks."android:build"]
description = "Compile the Android App"
dir = "apps/android"
run = "gradlew assembleDebug"

[tasks."android:install"]
description = "Install the debug APK on a connected device/emulator"
dir = "apps/android"
run = "gradlew installDebug"

[tasks."android:clean"]
description = "Clean the Gradle build cache"
dir = "apps/android"
run = "gradlew clean"

[tasks."db:up"]
description = "Starts the ironbook_db service from docker-compose-dev.yaml"
run = "docker compose -f docker-compose-dev.yaml up ironbook_db"

[tasks."db:down"]
description = "Stops the ironbook_db service from docker-compose-dev.yaml"
run = "docker compose -f docker-compose-dev.yaml down ironbook_db"
