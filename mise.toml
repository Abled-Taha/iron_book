[tools]
rust = { version = "1.95.0", components = ["rustfmt", "clippy"] }
node = "24"
java = "openjdk-21"
android-sdk = "1.0"
uv = "0.11.14"

[env]
MISE_INSTALLS_DIR = "{{config_root}}/.mise/installs"
_path = "./.cargo/bin"
MISE_COREPACK = "1"
ANDROID_HOME = "{{config_root}}/.android_sdk"
JAVA_HOME = "{{config_root}}/.mise/installs/java/openjdk-21"
_.python.venv = "{{config_root}}/apps/web/.venv"

[tasks."setup"]
description = "Install all dependencies"
run = [
  "corepack enable pnpm",
  "corepack use pnpm@11.1.2",
  "sdkmanager --sdk_root={{env.ANDROID_HOME}} --licenses",
  "sdkmanager --sdk_root={{env.ANDROID_HOME}} \"platform-tools\" \"build-tools;34.0.0\" \"platforms;android-34\" \"cmdline-tools;latest\"",
  "cargo check",
  "pnpm install",
  "uv sync --project apps/web"
]

[tasks."setup:local-props"]
description = "Generate local.properties safely across OS"
dir = "apps/android"
run = "python -c \"open('local.properties', 'w').write('sdk.dir=' + r'{{env.ANDROID_HOME}}'.replace('\\\\', '/'))\""

# Development

[tasks."dev:api"]
description = "Run Rust API Dev Server"
run = "cargo run --bin api"

[tasks."dev:home"]
description = "Run NextJS Dev Server"
run = "pnpm --filter ./apps/home dev"

[tasks."dev:web"]
dir = "apps/web"
description = "Run Django Dev Server"
run = "python manage.py tailwind dev"

# Production

[tasks."prod:home"]
description = "Run NextJS Prod Server"
run = [
  "pnpm --filter ./apps/home build",
  "pnpm --filter ./apps/home start"
]

# Environment

[tasks."code"]
description = "Launch VS Code with injected monorepo environment"
run = "code ."

[tasks."android:build"]
description = "Compile the Android App"
dir = "apps/android"
run = "gradlew assembleDebug"

[tasks."android:install"]
description = "Install the debug APK on a connected device/emulator"
dir = "apps/android"
run = "gradlew installDebug"

[tasks."android:clean"]
description = "Clean the Gradle build cache"
dir = "apps/android"
run = "gradlew clean"